<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>番茄钟</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 自定义标题栏 -->
  <div class="titlebar">
    <span class="titlebar-drag">番茄钟</span>
    <div class="titlebar-buttons">
      <button id="btn-minimize" class="titlebar-btn">&#x2014;</button>
      <button id="btn-close" class="titlebar-btn">&#x2715;</button>
    </div>
  </div>

  <!-- 标签切换 -->
  <div class="tabs">
    <button class="tab active" data-tab="timer">计时器</button>
    <button class="tab" data-tab="stats">统计</button>
  </div>

  <!-- 计时器页面 -->
  <div id="page-timer" class="page active">
    <div class="phase-label" id="phase-label">工作</div>

    <div class="timer-ring">
      <svg viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="90" />
        <circle class="ring-progress" id="ring-progress" cx="100" cy="100" r="90" />
      </svg>
      <div class="timer-display" id="timer-display">25:00</div>
    </div>

    <div class="pomodoro-count" id="pomodoro-count">0 / 4</div>

    <div class="controls">
      <button id="btn-reset" class="ctrl-btn" title="重置">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 1 3 6.7"/><path d="M3 7v5h5"/></svg>
      </button>
      <button id="btn-start" class="ctrl-btn primary" title="开始">
        <svg id="icon-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>
        <svg id="icon-pause" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
      </button>
      <button id="btn-skip" class="ctrl-btn" title="跳过">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5,4 15,12 5,20" fill="currentColor"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
      </button>
    </div>
  </div>

  <!-- 统计页面 -->
  <div id="page-stats" class="page">
    <div class="stats-today">
      <div class="stats-number" id="stats-today-count">0</div>
      <div class="stats-label">今日番茄</div>
    </div>
    <div class="stats-week">
      <div class="stats-section-title">本周统计</div>
      <canvas id="week-chart" width="340" height="180"></canvas>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
